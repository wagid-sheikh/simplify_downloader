<table>
  <thead><tr><th>Order</th><th>Net Amount</th><th>Payment Received</th></tr></thead>
  <tbody>
  {% for row in rows %}<tr><td>{{ row.order_number }}</td><td>{{ row.net_amount | format_amount if row.net_amount is not none else '--' }}</td><td>{{ row.payment_received | format_amount if row.payment_received is not none else '--' }}</td></tr>{% endfor %}
  </tbody>
</table>
